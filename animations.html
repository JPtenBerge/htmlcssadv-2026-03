<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="stylesheet" href="reset.css" />
		<style>

            /* body {
                transition: 4s all ease;
                &:hover {
                    transform: rotate(360deg);;
                }
            } */

            @keyframes blinkert {
                from {
                    opacity: 0;
                    font-size: 100%;
                    color: black;
                }
                to {
                    opacity: 1;
                    font-size: 200%;
                    color: red;
                }
            }
            blink {
                animation: blinkert 0.5s infinite alternate-reverse;
            }

			nav ol {
				display: flex;
				gap: 1rem;
			}
			a {
				padding: 1rem;
				background: lightgreen;
				display: block;
				margin: 0.5rem;
				transition: 0.2s all ;
				opacity: 0.5;

				&:hover {
					background: darkgreen;
					color: white;
					opacity: 1;
                    margin-left: 40px;
                    transform: scale(1.5) translateX(10px) rotate(5deg);
				}
			}
		</style>
	</head>
	<body>
		<nav>
			<ol>
				<li><a href="/start">Start</a></li>
				<li><a href="/portfolio">Portfolio</a></li>
				<li><a href="/contact">Contact</a></li>
			</ol>
		</nav>

        <blink>hier blinky</blink>
	</body>
</html>
