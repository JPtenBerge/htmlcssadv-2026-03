<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="nav.css" />

    <style>
        * {
            box-sizing: border-box;
        }

        @view-transition {
            navigation: auto;
        }
        /* block element: neemt standaard alle ruimte in */
        div {
            background: red;
            width: calc(100% - 30px);
            padding: 0.8rem;
            border: 0.8rem solid purple;
            margin: 15px;
        }
        p {
            display: block;
            background: lightpink;
        }
        /* inline element: bedoeld om in een paragraaf tekst op te nemen */
        span {
            background: lightgreen;
            padding: 1rem;
            margin: 1rem;
            display: inline-block;
        }
    </style>
</head>
