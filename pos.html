            .grid-blokjes {
                background: lightgreen;
                display: grid;
                gap: 10px;
                grid-template-rows: 80px 120px 60px;
                grid-template-columns: 2fr 4fr;

                    margin: 5px;
                    background: darkgreen;
                    color: white;
                    padding: 20px;
                }
            }
